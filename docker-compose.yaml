services:

  # ─── Data layer ───────────────────────────────────────────────────────────────

  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: fragrance
      POSTGRES_USER: fragrance
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fragrance -d fragrance"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Search ───────────────────────────────────────────────────────────────────

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng:rw
    # No ports: intentionally unreachable from outside Docker — backend calls it
    # over the internal network at http://searxng:8080
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--header=X-Real-IP:127.0.0.1", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - public

  # ─── Backend ──────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: /app/.venv/bin/python -m gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    env_file: backend/.env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: /app/.venv/bin/python -m celery -A config worker -l info --concurrency 4
    env_file: backend/.env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    networks:
      - internal
      - public

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # DatabaseScheduler reads PeriodicTask rows created per-user via the API
    command: >
      /app/.venv/bin/python -m celery -A config beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: backend/.env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: node .output/server/index.mjs
    environment:
      NUXT_PUBLIC_API_BASE: ${PUBLIC_API_BASE:-https://fragrances.supermanzer.io/api/v1}
      PORT: 3000
    networks:
      - internal

  # ─── Reverse proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - public


volumes:
  postgres_data:
  static_files:

networks:
  internal:
    driver: bridge
    internal: true   # no direct internet access; nginx bridges to public
  public:
    driver: bridge
