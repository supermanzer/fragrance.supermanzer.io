events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting — applied to the auth endpoints to slow brute-force attempts.
    # 10 requests/minute per IP; burst of 5 allows brief spikes without 429s.
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:3000; }

    # ── HTTP ─────────────────────────────────────────────────────────────────
    # TLS is terminated by the hosting provider before traffic reaches nginx.
    # Once the provider confirms TLS is active, replace this server block with:
    #   return 301 https://$host$request_uri;

    server {
        listen 80;
        server_name fragrances.supermanzer.io;

        location /static/ {
            alias /app/staticfiles/;
        }

        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 2m;
        }

        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

}
